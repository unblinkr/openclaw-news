name: Daily News Update

on:
  schedule:
    - cron: '0 14 * * *'  # 2 PM UTC daily (9 AM EST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Generate daily post with Claude AI
        run: npx tsx scripts/generate-daily-post.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push new post
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "bot@openclaw.news"
          git add src/lib/posts.ts
          git diff --staged --quiet && echo "No new post today" && exit 0
          git commit -m "Daily post: $(date +%Y-%m-%d)"
          git push origin main

      - name: Post to social via Buffer
        run: npx tsx scripts/auto-post-to-buffer.ts
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true  # Don't fail the whole run if Buffer has issues
